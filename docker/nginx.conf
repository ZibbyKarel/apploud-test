# Round-robins requests across the two app instances, standing in for the
# production load balancer that docs/SCALABILITY.md's multi-instance section
# assumes. Hit http://localhost:3000 and successive requests alternate between
# web1 and web2.
upstream app {
    server web1:3000;
    server web2:3000;
}

server {
    listen 80;

    location / {
        proxy_pass http://app;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Surface which upstream instance served the request, so round-robin is
        # observable: `curl -sI localhost:3000 | grep X-Upstream` alternates.
        add_header X-Upstream $upstream_addr always;
    }
}
